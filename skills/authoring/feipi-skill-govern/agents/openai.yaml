version: 2
interface:
  display_name: "Skill 工程治理（中文）"
  short_description: "用于治理 skill 的命名、layer、触发、执行、模板、脚本与验证边界；仅在 skill 工程任务中触发。"
  default_prompt: "请仅在任务属于 skill 创建、重构、治理、自检或规范审计时触发 feipi-skill-govern；若任务是普通业务执行，不要误用本 skill。先锁定唯一目标 skill 与允许改动的直接共享文件，再判断问题落在触发层、执行层、资源层、脚本归位层还是验证层。若涉及命名或迁移，命名决策顺序固定为 domain -> action -> object -> layer，统一使用 feipi-<domain>-<action>-<object...>，仅 feipi-skill-govern 允许保留特例；不要继续传播旧 action-first 命名文本，也不要把 web、ops、automate 当默认 action。实现时默认只修改目标 skill 与直接共享文件；发现其他 skill 问题时只记录到待重审清单，不无边界扩散。验证时写清仓库根命令与 skill 目录命令的边界，至少完成结构校验、行为校验和旧规则残留搜索；若改了模板或初始化脚本，必须生成临时 skill 验证。若目标是 feipi-skill-govern，自检范围应覆盖 SKILL.md、agents/openai.yaml、references/、scripts/、assets/、templates/，并输出问题清单、修复清单、规则摘要、待重审清单与重启建议。"
