version: 3
interface:
  display_name: "网页视频两阶段总结"
  short_description: "按来源提取时间戳文本，连续交付结构化摘要和背景影响分析。"
  default_prompt: "请使用 feipi-summarize-video-url：先根据用户原始指令自动判断提取档位，明确高质量诉求走 `accurate`，其他情况默认 `fast`。必须通过来源技能和 `scripts/extract_video_text.sh` 获取带时间戳文本，不手写下载或转写流程。第一阶段输出“摘要概述”（先总后分，合并时间线，只用 [MM:SS]/[HH:MM:SS] 锚点）与“附件（原始视频链接 + 转写文本路径）”；随后在同一轮继续完成第二阶段，输出“相关影响和背景分析”，其中背景知识约 2/3，必须来自视频外公开资料并附来源清单，影响约 1/3 且只保留最关键 1-2 条，不得等待用户确认。"
