version: 2
interface:
  display_name: "创新提案交底书生成（中文）"
  short_description: "把零散创新点整理成固定模板交底书，覆盖必填信息确认、图示协同与格式校验。"
  default_prompt: "请使用 feipi-gen-innovation-disclosure：先从当前对话提取已知信息，再确认专利名、使用场景两项必填输入；缺失时先提问，不得自行脑补。若只有抽象口号，没有模块、步骤、阈值、失败环节或场景事实，先要求用户补充 3 至 5 条可核对事实。应用产品/项目（含时间）为可选输入，未提供时不追问，在对应章节写“暂无明确产品/项目（计划在该场景验证，时间待定）”或“无”。写作采用工程复盘口吻，先写事实再写判断：每条尽量包含对象、动作、条件或结果。按模板先搭完整骨架，再逐章填充；申请说明保持简洁，背景写事实锚点，详细描述写成最常见场景的一条完整流程。图示必须用 feipi-gen-plantuml-code 生成并校验后再写入：至少 1 图，建议模块图加主流程图；模块图 2-3 层且一级层分色；主流程核心步骤控制在 5-10 步；正文和图统一使用 S1...Sn 编号；核心创新图若提供需更精简。完成后执行格式自检，若失败优先修复缺章、字数超限、图文不一致等硬错误。"
