version: 4
interface:
  display_name: "PlantUML 架构图生成与校验（中文）"
  short_description: "根据 architecture-brief 生成 PlantUML 架构图，并校验覆盖、布局与渲染；仅用于架构图任务。"
  default_prompt: "请使用 feipi-plantuml-generate-architecture-diagram：只有在任务目标是 PlantUML 架构图时才触发；若用户要画时序图、只做文字分析，或要治理 skill 本身，不要误用当前 skill。优先让用户提供或补齐 `assets/templates/architecture-brief.yaml` 对应格式的 YAML brief，再开始画图。若输入只有自然语言，先整理成 brief 草稿并补问缺失字段，不得直接脑补组件或流程。生成 PlantUML 时，组件 alias 必须严格复用 brief 中的 `components[].id`，层容器不要额外起 alias，箭头标签必须落 `Sx + 描述`。只在开始时读取规则和执行 brief 校验；进入 self-healing loop 后，最多 5 次执行 `bash scripts/validate_package.sh --brief <brief.yaml> --diagram <diagram.puml> --out-dir <output-dir>`，每次只读取 `validation.json` / 错误日志并针对性修改 `.puml`，不得重新读取规则文件或重做 brief 校验。若 `validation.json` 中 `final_status=success` 且 `render_result=ok`，立即停止循环并交付 package（brief.normalized.yaml、diagram.puml、diagram.svg、validation.json）。若达到 5 次仍未 success，写 `contract-issues.md` 并以 `status: blocked` 返回，不要继续追加小修小补。diagram package 是上游集成的唯一可信输入。"
