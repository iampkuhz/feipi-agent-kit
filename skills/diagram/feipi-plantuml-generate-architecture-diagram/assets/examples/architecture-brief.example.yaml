diagram_id: ecommerce-order-arch
diagram_type: architecture
title: "电商下单链路架构图"
summary: "展示用户下单请求从接入、应用到数据层的核心组件和调用关系。"

layers:
  - id: access
    name: 接入层
    description: 用户入口与交互界面
    color: "#D6EAF8"
  - id: application
    name: 应用层
    description: 订单、库存和支付等业务服务
    color: "#D5F5E3"
  - id: data
    name: 数据层
    description: 订单与库存持久化存储
    color: "#FCF3CF"

components:
  - id: user
    name: 用户
    layer: access
    type: actor
    description: 发起下单操作的终端用户
  - id: web_portal
    name: 商城前台
    layer: access
    type: component
    description: 接收用户下单请求的前端入口
  - id: order_service
    name: 订单服务
    layer: application
    type: component
    description: 负责创建订单和编排交易流程
  - id: inventory_service
    name: 库存服务
    layer: application
    type: component
    description: 负责预占和扣减库存
  - id: payment_gateway
    name: 支付网关
    layer: application
    type: cloud
    description: 对接外部支付渠道完成支付
  - id: order_db
    name: 订单库
    layer: data
    type: database
    description: 存储订单主记录
  - id: inventory_db
    name: 库存库
    layer: data
    type: database
    description: 存储库存和预占状态

flows:
  - id: S1
    from: user
    to: web_portal
    description: 提交下单请求
  - id: S2
    from: web_portal
    to: order_service
    description: 转发创建订单请求
  - id: S3
    from: order_service
    to: inventory_service
    description: 预占库存
  - id: S4
    from: order_service
    to: payment_gateway
    description: 发起支付
  - id: S5
    from: order_service
    to: order_db
    description: 写入订单记录
  - id: S6
    from: inventory_service
    to: inventory_db
    description: 更新库存状态

layout:
  direction: top_to_bottom
  include_legend: true

out_of_scope:
  - 营销优惠计算
  - 监控告警指标
