# 架构图需求模板
#
# 使用方式：
# 1. 复制本文件，替换所有尖括号占位符。
# 2. 执行：python3 scripts/validate_brief.py ./your-brief.yaml
# 3. 校验通过后，再根据 brief 生成 PlantUML。

diagram_id: <diagram-id>
diagram_type: architecture
title: "<图标题>"
summary: "<这张图要表达的核心内容>"

layers:
  - id: access
    name: <接入层>
    description: <这一层负责什么>
    color: "#D6EAF8"
  - id: application
    name: <应用层>
    description: <这一层负责什么>
    color: "#D5F5E3"
  - id: data
    name: <数据层>
    description: <这一层负责什么>
    color: "#FCF3CF"

components:
  - id: client
    name: <用户或入口组件>
    layer: access
    type: actor
    description: <组件职责>
  - id: service_a
    name: <应用组件 A>
    layer: application
    type: component
    description: <组件职责>
  - id: store_a
    name: <数据组件 A>
    layer: data
    type: database
    description: <组件职责>

flows:
  - id: S1
    from: client
    to: service_a
    description: <主流程描述>

layout:
  direction: top_to_bottom
  include_legend: true

out_of_scope:
  - <明确不进入图中的内容>
