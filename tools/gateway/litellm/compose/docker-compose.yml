# LiteLLM 轻量代理 - Docker Compose 配置
# 定位：本地 AI 模型网关，低内存占用
# 依赖：PostgreSQL（用于存储配置、日志、元数据）
# 健康检查：4000 端口可访问即视为健康

services:
  # PostgreSQL 数据库 - LiteLLM 必需的最小依赖
  postgres:
    image: docker.io/postgres:17
    container_name: litellm-db-podman
    hostname: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm_password}
      POSTGRES_DB: litellm
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    networks:
      litellm_network:
        aliases:
          - litellm-db

  # LiteLLM Proxy - 模型网关
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: litellm-proxy-podman
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    # 环境变量从宿主机继承（确保启动前已 source ~/.env 或对应文件）
    environment:
      # ===== 基础配置（必需） =====
      - LITELLM_MASTER_KEY
      # 百炼 OpenAI 兼容模型
      - LITELLM_CODE_MODEL_OPENAI
      - LITELLM_UPSTREAM_CODE_MODEL_OPENAI_NAME
      - LITELLM_UPSTREAM_CODE_MODEL_OPENAI_BASE
      - LITELLM_UPSTREAM_CODE_MODEL_OPENAI_KEY
      # 百炼 Anthropic 兼容模型
      - LITELLM_CODE_MODEL_ANTHROPIC
      - LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_NAME
      - LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_BASE
      - LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_KEY
      # 本地补全模型
      - LITELLM_AUTOCOMPLETE_MODEL_OPENAI
      - LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_NAME
      - LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_BASE
      - LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_KEY
      # 容器内访问宿主机端口，需清空代理避免请求被错误转发
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=127.0.0.1,localhost,host.containers.internal
      - no_proxy=127.0.0.1,localhost,host.containers.internal
      # Podman Compose 不保证 container_name 自动成为可解析别名，
      # 这里固定使用 postgres 服务暴露出的 litellm-db 网络别名连接数据库。
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      # 绕过有问题的迁移检查路径
      - "--use_prisma_db_push"
    volumes:
      - ../config/config.yaml:/app/config.yaml:ro
    networks:
      - litellm_network

# 定义网络
networks:
  litellm_network:
    driver: bridge

# 定义数据卷
volumes:
  postgres_data:
    driver: local
