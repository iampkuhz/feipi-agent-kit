# LiteLLM 配置
# 定位：统一多模型代理，简洁配置，适合个人本地使用
# 观测：不强制依赖任何本地观测组件，未来可通过 OTel 接入云端平台

model_list:
  - model_name: os.environ/LITELLM_CODE_MODEL_OPENAI
    litellm_params:
      # 百炼 OpenAI 兼容端点
      model: os.environ/LITELLM_UPSTREAM_CODE_MODEL_OPENAI_NAME
      api_base: os.environ/LITELLM_UPSTREAM_CODE_MODEL_OPENAI_BASE
      api_key: os.environ/LITELLM_UPSTREAM_CODE_MODEL_OPENAI_KEY

  - model_name: os.environ/LITELLM_CODE_MODEL_ANTHROPIC
    litellm_params:
      # 百炼 Anthropic 兼容端点
      model: os.environ/LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_NAME
      api_base: os.environ/LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_BASE
      api_key: os.environ/LITELLM_UPSTREAM_CODE_MODEL_ANTHROPIC_KEY

  - model_name: os.environ/LITELLM_AUTOCOMPLETE_MODEL_OPENAI
    litellm_params:
      # 本地 OMLX 端点
      model: os.environ/LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_NAME
      api_base: os.environ/LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_BASE
      api_key: os.environ/LITELLM_UPSTREAM_AUTOCOMPLETE_MODEL_OPENAI_KEY

# ===== LiteLLM 运行时设置 =====
# 这里不能只保留注释而没有实际键值；YAML 会把 `litellm_settings` 解析成 null，
# LiteLLM 1.81.x 的 Playground / Team 配置读取路径会直接对其调用 `.get(...)`，
# 从而触发 `'NoneType' object has no attribute 'get'`。
litellm_settings:
  success_callback: []
  failure_callback: []
  default_team_settings: {}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  database_connection_pool_limit: 5
  proxy_batch_write_at: 2
  store_prompts_in_spend_logs: true
  max_request_size_mb: 16
  max_response_size_mb: 32
  maximum_spend_logs_retention_period: "1d"
  maximum_spend_logs_retention_interval: "1d"
