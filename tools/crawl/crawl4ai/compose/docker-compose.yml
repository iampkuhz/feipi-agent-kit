# Crawl4AI Service - Docker Compose 配置
# 定位：Web 内容抓取和提取服务

# 固定 Compose 项目名，避免多个 tools/**/compose 目录都落到默认的 compose 项目下。
name: crawl4ai

services:
  crawl4ai:
    image: docker.io/unclecode/crawl4ai:0.8.6
    container_name: crawl4ai
    ports:
      - "11235:11235"
    env_file:
      - ../env/.env
    environment:
      NO_PROXY: 127.0.0.1,localhost,0.0.0.0,::1,host.containers.internal
      no_proxy: 127.0.0.1,localhost,0.0.0.0,::1,host.containers.internal
    volumes:
      - /dev/shm:/dev/shm
      - ../config/config.yml:/app/config.yml:ro
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
